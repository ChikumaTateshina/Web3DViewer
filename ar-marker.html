<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>マーカーAR - 3D Model Viewer</title>

    <!-- AR.js（マーカー型）は A-Frame 1.6.0 が必要。通常ビューア(index.html)の 1.4.2 とは別バージョンのため、
         このページを独立させています。 -->
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.7/aframe/build/aframe-ar.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.4/dist/aframe-extras.min.js"></script>
    <script src="config.js"></script>

    <link rel="stylesheet" href="ar.css">
</head>
<body>
    <a-scene
        id="scene"
        vr-mode-ui="enabled: false"
        renderer="colorManagement: true; antialias: true"
        embedded
        arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 3x3; debugUIEnabled: false;">

        <a-assets></a-assets>

        <a-marker id="marker" preset="hiro">
            <a-entity id="ar-model"></a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <!-- 画面上部：マーカー未検出時の案内 -->
    <div id="ar-hint">
        <div id="ar-hint-text">マーカーにカメラを向けてください</div>
    </div>

    <!-- 右下：モード切り替え／戻るボタン -->
    <div id="ar-btn-group">
        <a id="back-btn" href="index.html" title="通常ビューアに戻る">
            <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            <span class="ar-btn-label">戻る</span>
        </a>
    </div>

    <script src="ar-marker.js"></script>
</body>
</html>
